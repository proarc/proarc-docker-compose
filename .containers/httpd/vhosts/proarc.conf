<VirtualHost *:80>
    ServerName ansible-proarc.inovatika.dev
    DocumentRoot "/usr/local/apache2/htdocs/proarc"

    <IfModule mod_proxy.c>
      ProxyPass /api http://127.0.0.1:8080/proarc
      ProxyPassReverse /api http://127.0.0.1:8080/proarc
      ProxyPassReverseCookiePath /proarc /api
    </IfModule>

    <Directory "/usr/local/apache2/htdocs/proarc">
        AllowOverride All
        Require all granted
    </Directory>

    RewriteEngine on
    RewriteCond %{SERVER_NAME} =ansible-proarc.inovatika.dev
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>