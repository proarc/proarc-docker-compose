<VirtualHost *:443>
    ServerName ansible-proarc.inovatika.dev
    DocumentRoot "/usr/local/apache2/htdocs/proarc"

    <IfModule mod_proxy.c>
      ProxyPass /api http://proarc:8080/proarc
      ProxyPassReverse /api http://proarc:8080/proarc
      ProxyPassReverseCookiePath /proarc /api
    </IfModule>

    <Directory "/usr/local/apache2/htdocs/proarc">
        AllowOverride All
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/fullchain.pem
    SSLCertificateKeyFile /etc/ssl/private/privkey.pem
</VirtualHost>