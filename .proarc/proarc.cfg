#
# ProArc Configuration Template
#
# Version 5.0.2
#
# The template lists default properties. To override them copy given properties
# to $PROARC_HOME/proarc.cfg.
#
# The template file is auto generated and all changes will be descarded!

## Default location for user data. It contains newly created user home folders.
proarc.users.home=${proarc.home}/users

proarc.storage=AKUBRA

proarc.sessionTimeout=3600

batch.scheduler.startTime=18:00
batch.scheduler.endTime=06:00

# (4.3.0) App state location:
# If "CZ" → URN:NBN identifier is required.
# Otherwise → Missing URN:NBN identifier is not an error.
proarc.app.state=CZ

## The comma separated list of autheticators for user login.
# Supported values are proarc (internal users), desa (remote users).
authenticators=proarc

## The comma separated list of digital object plugin IDs.
# Supported values are ndk, k4, oldprint, bdm, ndkAudio, ndkEborn
digobject.plugins=ndk, k4, oldprint, ndkEborn, ndkAudio, bdm

## Bibliographic metadata catalogs
# lists catalog IDs to include in configuration
catalogs=nkp_skc

# Aleph NKP, base skc
catalog.nkp_skc.url=aleph.nkp.cz:9991
catalog.nkp_skc.base=SKC-UTF
catalog.nkp_skc.name=NKP (base SKC)
catalog.nkp_skc.type=Z3950Catalog
catalog.nkp_skc.recordCharset=UTF-8
catalog.nkp_skc.fields=issn, isbn, 001, title, ccnb
catalog.nkp_skc.field.issn.query=@attrset bib-1 @attr 1=8 "%s"
catalog.nkp_skc.field.isbn.query=@attrset bib-1 @attr 1=7 "%s"
catalog.nkp_skc.field.001.query=@attrset bib-1 @attr 1=12 "%s"
catalog.nkp_skc.field.title.query=@attrset bib-1 @attr 1=4 "%s"
catalog.nkp_skc.field.ccnb.query=@attrset bib-1 @attr 1=5002 @attr 4=1 "%s"

## URN:NBN resolvers
# Comma separated list of resolver profiles.
urnnbn.resolvers=test

# The registrar ID.
urnnbn.resolver.inovatika.registrar=
urnnbn.resolver.inovatika.title=Test
urnnbn.resolver.inovatika.url=https://resolver-test.nkp.cz/api/v4
urnnbn.resolver.inovatika.user=
urnnbn.resolver.inovatika.passwd=

## Import options

# A comma separated list of import profile IDs. Each ID is used as a prefix of keys
# to describe the profile (ID.label, ID.description, ID.file).
# ID.file has an URL syntax. Absolute and relative (to proarc.cfg) paths are possible.
# Referenced profile files have the same syntax as proarc.cfg.
import.profiles=profile.default, profile.defaultocr, profile.default_archive_import, profile.default_ndk_import, profile.soundrecording_import, profile.replace_stream_import

profile.default.label=NDK Monografie a Periodika
profile.default.description=Profil pro NDK Monografie a Periodika

profile.defaultocr.label=NDK Monografie a Periodika s vytvořením OCR
profile.defaultocr.description=Vychozi profil pro NDK Monografie a Periodika. Generuje OCR a ALTO.
profile.defaultocr.file=profile.defaultocr.cfg

profile.default_archive_import.label=Archivni balicek
profile.default_archive_import.description=Profil pro import archivniho balicku

profile.soundrecording_import.label=Zvukove nahravky
profile.soundrecording_import.description= Profil pro zvukové dokumenty. Požaduje NDK_ARCHIVAL a NDK_USER.
profile.soundrecording_import.file=profile.soundrecording.cfg

profile.replace_stream_import.label=Nahrazení streamů
profile.replace_stream_import.description=Profil pro nahrazování streamů. Podle shody názvu souboru
profile.replace_stream_import.file=profile.replace_stream_import.cfg

# profile.default_ndk_import is an ID of the default ndk import profile
# that is based on proarc.cfg
profile.default_ndk_import.label=NDK PSP
profile.default_ndk_import.description=NDK PSP import profile

# The model ID of new pages created with the batch import.
# Supported values: model:page and model:ndkpage
import.page.modelId=model:ndkpage

# The model ID of new audio pages created with the batch import.
import.ndkaudiopage.modelId=model:ndkaudiopage

# Create models hierarchy in SoundRecording import.
import.create.models_hierarchy=false

# Comma separated list of datastream IDs that are required on import.
import.requiredDatastreamId=ALTO, TEXT_OCR, NDK_ARCHIVAL, NDK_USER

## NDK_ARCHIVAL, NDK_USER datastreams
import.ndk_archival.file.suffix=.mc.jp2
import.ndk_user.file.suffix=.uc.jp2
import.ndk_audio_archival.file.suffix=.ac.wav
import.ndk_audio_user.file.suffix=.uc.mp3

import.delete_package=true

# konfigurace propojenych instanci Krameria
krameriusInstances=local

krameriusInstance.local.title=Local

krameriusInstance.kramerius7.title=Kramerius 7
krameriusInstance.kramerius7.version=7
krameriusInstance.kramerius7.type=prod
krameriusInstance.kramerius7.url=https://k7.organization.cz
krameriusInstance.kramerius7.urlKeycloak=https://eduid.organization.cz
krameriusInstance.kramerius7.urlLogin=/realms/kramerius/protocol/openid-connect/token
krameriusInstance.kramerius7.urlParametrizedImportQuery=/search/api/admin/v7.0/processes
krameriusInstance.kramerius7.urlConvertImportQuery=/search/api/admin/v7.0/processes
krameriusInstance.kramerius7.urlStateQuery=/search/api/admin/v7.0/processes/by_process_uuid/
krameriusInstance.kramerius7.urlDownloadFoxml=/search/api/client/v7.0/items/
krameriusInstance.kramerius7.urlImage=/search/iiif/
krameriusInstance.kramerius7.urlLicense=/search/api/admin/v7.0/licenses
krameriusInstance.kramerius7.username=*
krameriusInstance.kramerius7.passwd=*
krameriusInstance.kramerius7.clientId=krameriusClient
krameriusInstance.kramerius7.clientSecret=password
krameriusInstance.kramerius7.grantType=password
krameriusInstance.kramerius7.exportFoxmlFolder=/data/krameriusImport/foxml
krameriusInstance.kramerius7.krameriusImportFoxmlFolder=/proarcExport/
krameriusInstance.kramerius7.exportNdkFolder=/data/krameriusImport/ndk
krameriusInstance.kramerius7.krameriusConvertNdkFolder=/proarcExport/
krameriusInstance.kramerius7.deleteAfterImport=true

# A name of the subject that creates the package. The sigla recommended.
export.ndk.agent.creator=

# A name of the subject that owns the package. The sigla recommended.
export.ndk.agent.archivist=

# Default value of rules.
# Supported values are aacr, rda.
metadata.mods.rules=rda

# Overwrite package if exporting the same package
# Supported values are false, true
export.overwritePackage=true

# Deleting package if URN:NBN is missing
# Supported values are false, true
export.deletePackageIfUrnNbnIsMissing=true

import.ndk_archival.processor=grk_ac
import.ndk_user.processor=grk_uc
import.jp2_convertor.processor=grk_tiff

processor.grk_ac.exec=grk_compress
processor.grk_ac.type=kdu_compress
processor.grk_ac.arg=-r
processor.grk_ac.arg=1
processor.grk_ac.arg=-t
processor.grk_ac.arg=4096\,4096
processor.grk_ac.arg=-p
processor.grk_ac.arg=RPCL
processor.grk_ac.arg=-n
processor.grk_ac.arg=6
processor.grk_ac.arg=-c
processor.grk_ac.arg=\[256\,256\]\,\[256\,256\]\,\[128\,128\]\,\[128\,128\]\,\[128\,128\]\,\[128\,128\]
processor.grk_ac.arg=-b
processor.grk_ac.arg=64\,64
processor.grk_ac.arg=-M
processor.grk_ac.arg=1
processor.grk_ac.arg=-S
processor.grk_ac.arg=-E
processor.grk_ac.arg=-X
processor.grk_ac.arg=-u
processor.grk_ac.arg=R
processor.grk_ac.arg=-H
processor.grk_ac.arg=4

processor.grk_uc.exec=grk_compress
processor.grk_uc.type=kdu_compress
processor.grk_uc.arg=-I
processor.grk_uc.arg=-r
processor.grk_uc.arg=362\,256\,181\,128\,90\,64\,45\,32\,22\,16\,11\,8
processor.grk_uc.arg=-f
processor.grk_uc.arg=-t
processor.grk_uc.arg=1024\,1024
processor.grk_uc.arg=-p
processor.grk_uc.arg=RPCL
processor.grk_uc.arg=-n
processor.grk_uc.arg=6
processor.grk_uc.arg=-c
processor.grk_uc.arg=\[256\,256\]\,\[256\,256\]\,\[128\,128\]\,\[128\,128\]\,\[128\,128\]\,\[128\,128\]
processor.grk_uc.arg=-b
processor.grk_uc.arg=64\,64
processor.grk_uc.arg=-M
processor.grk_uc.arg=1
processor.grk_uc.arg=-X
processor.grk_uc.arg=-u
processor.grk_uc.arg=R
processor.grk_uc.arg=-H
processor.grk_uc.arg=4

processor.grk_tiff.exec=grk_decompress
processor.grk_tiff.type=kdu_expand
processor.grk_tiff.arg=-q
processor.grk_tiff.arg=-p
processor.grk_tiff.arg=8


#------------------------------ Nastaveni post procesoru pro Bagit
## (4.0) pro process BAGIT v NDK a Archive exportu
export.bagit_post_processor.processor=bagit
processor.bagit.exec=python3
processor.bagit.arg=-m
processor.bagit.arg=bagit
processor.bagit.arg=--md5

## (4.0) pro zabaleni do zipu v NDK a Archive exportu
export.zip_post_processor.processor=zip
processor.zip.exec=zip
processor.zip.arg=-r


#-------------------------- Generator OCR

import.ocr_generator.processor=peroCmd

processor.peroCmd.key=
processor.peroCmd.url=https://pero-ocr.fit.vutbr.cz/api/

metadata.mods.location.physicalLocation.sigla=ABA007, ABA010, ABE370, ABG001, BOA001, HBG001, HKA001, CBA001


## (4.2) Cesta k externe referencovanemu configu klienta
proarc.client.path.config=/root/.proarc/client_config/globals.json


